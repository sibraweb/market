<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Módulo 3 — Rotaciones · Sibratech</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Raleway:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="../shared/sibra-auth.js"></script>
<script src="../shared/sibra-cache.js"></script>
<script src="../shared/sibra-brokers-data.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E10600;--gray:#4FF4FF;--white:#FFFFFF;--black:#0B0B0B;
  --bg:#0d0f14;--bg2:#111827;--bg3:#1a1d26;
  --border:#1e293b;--border2:#334155;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#475569;
  --green:#4ade80;--green-bg:#052e16;--green-border:#16a34a;
  --red-light:#fca5a5;--red-bg:#450a0a;--red-border:#dc2626;
  --blue:#60a5fa;
}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Layout */
#app{display:none;flex-direction:column;min-height:100vh}
#header{background:var(--black);border-bottom:2px solid var(--red);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
#header .logo{height:36px}
#header .app-title{font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:3px;color:var(--text2);text-transform:uppercase}
#header .user-info{display:flex;align-items:center;gap:12px;font-size:11px;color:var(--text3)}
#header .user-avatar{width:28px;height:28px;border-radius:50%;border:1px solid var(--red)}
.back-btn{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:5px 12px;border-radius:4px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:11px;text-decoration:none;display:flex;align-items:center;gap:5px;transition:all .2s}
.back-btn:hover{border-color:var(--red);color:var(--red-light)}
.btn-logout{background:transparent;border:1px solid var(--border2);color:var(--text3);padding:3px 10px;cursor:pointer;font-size:10px;font-family:'Montserrat',sans-serif;letter-spacing:1px}
.btn-logout:hover{border-color:var(--red);color:var(--red-light)}
#toolbar{background:var(--black);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
#content{flex:1;padding:20px 24px;max-width:1700px;width:100%}

/* Selector bar */
.selector-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;width:100%}
.selector-label{font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;white-space:nowrap}
.autocomplete-wrap{position:relative;flex:1;min-width:180px;max-width:280px}
.autocomplete-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 10px;font-family:'Montserrat',sans-serif;font-size:12px;outline:none}
.autocomplete-wrap input:focus{border-color:var(--red)}
.autocomplete-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-top:none;z-index:200;max-height:220px;overflow-y:auto}
.autocomplete-item{padding:6px 10px;cursor:pointer;font-size:11px;color:var(--text2)}
.autocomplete-item:hover{background:var(--bg3);color:var(--text)}
.separator{color:var(--border2);font-size:16px}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:0}
.tab{padding:10px 20px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.tab:hover:not(.active){color:var(--text2)}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);padding:14px}
.card-grid{display:grid;gap:8px;margin-bottom:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:1fr 1fr 1fr 1fr}
.label{font-size:9px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-bottom:4px}
.value{font-size:14px;color:var(--text);font-weight:600}
.value-sm{font-size:12px;color:var(--text2)}
.section-title{font-size:9px;letter-spacing:2px;color:var(--red);text-transform:uppercase;border-left:2px solid var(--red);padding-left:8px;margin-bottom:12px}

/* Inputs */
.input-field{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 8px;font-family:'Montserrat',sans-serif;font-size:12px;width:100%;outline:none}
.input-field:focus{border-color:var(--red)}
.pct-control{display:flex;align-items:center;gap:3px}
.pct-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:3px 7px;cursor:pointer;font-size:10px;font-family:'Montserrat',sans-serif;white-space:nowrap}
.pct-btn:hover{background:var(--border2);color:var(--text)}
.pct-input{width:52px!important;text-align:center}

/* Tablas */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#0f1319;color:var(--text3);font-weight:600;padding:7px 10px;text-align:right;border-bottom:1px solid var(--border);letter-spacing:.5px;white-space:nowrap}
th:first-child{text-align:left}
td{padding:5px 10px;text-align:right;border-bottom:1px solid #0a0c10;color:#cbd5e1;white-space:nowrap}
td:first-child{text-align:left;color:var(--text);font-weight:500}
tr:hover td{background:#0d1117}

/* Semáforo */
.semaforo{padding:10px 16px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.sem-ok{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green)}
.sem-mal{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red-light)}
.sem-label{font-size:9px;letter-spacing:1px;margin-bottom:2px}
.sem-value{font-size:13px;font-weight:600}

/* Botones */
.btn{padding:8px 20px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;transition:all .2s;border:1px solid}
.btn-red{background:var(--red);border-color:var(--red);color:#fff}
.btn-red:hover{background:#c00500}
.btn-red:disabled{opacity:.35;cursor:not-allowed}
.btn-green{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.btn-green:hover:not(:disabled){background:#064e1e}
.btn-green:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:transparent;border-color:var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--text2);color:var(--text)}

/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}

/* Login */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:24px;background:var(--bg)}
#login-screen img{height:60px}
#login-screen h2{font-family:'Raleway',sans-serif;font-size:18px;color:var(--text2);letter-spacing:3px;text-transform:uppercase}
#login-screen p{color:var(--text3);font-size:12px;text-align:center;max-width:340px;line-height:1.6}
.btn-google{display:flex;align-items:center;gap:10px;background:#fff;color:#333;padding:10px 24px;border:none;cursor:pointer;font-size:13px;font-weight:500;border-radius:2px;font-family:'Montserrat',sans-serif}
.btn-google:hover{background:#f0f0f0}

/* Loader */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px;color:var(--text3)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;font-size:12px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}
#toast.success{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green)}
#toast.error{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red-light)}

/* Loading overlay */
#loading-overlay{position:fixed;inset:0;background:rgba(13,15,20,.85);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:500}
#loading-overlay.show{display:flex}
#loading-overlay p{color:var(--text2);font-size:12px;letter-spacing:1px}

/* Error box */
.error-box{background:#1c0a0a;border:1px solid #7f1d1d;padding:24px;margin:20px 0;max-width:700px}
.error-box h3{color:var(--red-light);font-size:13px;margin-bottom:12px}
.error-box pre{color:#f87171;font-size:11px;white-space:pre-wrap;line-height:1.6;margin-bottom:12px}
.error-box ul{color:var(--text2);font-size:11px;line-height:2;margin-left:16px}
.warn-box{background:#1c0a0a;border:1px solid #7f1d1d;padding:8px 12px;font-size:10px;color:var(--red-light);margin-bottom:12px}
</style>
</head>

const fmt  = n => new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n||0);
const fmtN = n => new Intl.NumberFormat("es-AR",{maximumFractionDigits:0}).format(n||0);
const pct  = n => (n*100).toFixed(2)+"%";
const fl   = Math.floor;
const hoy  = () => new Date().toISOString().slice(0,10);
const uid  = () => Date.now()+Math.floor(Math.random()*999);
const esRF = t => CFG.RENTA_FIJA.some(p=>t.toUpperCase().startsWith(p));
const normPct = v => { const s=String(v||"").replace("%",""); const n=parseFloat(s); return isNaN(n)?0:(n>1?n/100:n); };
const normCC = v => { if (!v && v!==0) return ''; const n=parseFloat(String(v).trim()); return isFinite(n)?String(Math.round(n)):String(v).trim(); };

function showLoad(msg="Cargando..."){ $("loading-overlay").classList.add("show"); $("loading-msg").textContent=msg; }
function hideLoad(){ $("loading-overlay").classList.remove("show"); }
function toast(msg,tipo="success"){ const t=$("toast"); t.textContent=msg; t.className="show "+tipo; setTimeout(()=>{t.className=""},3500); }
function errBox(titulo,detalle){
  $("content").innerHTML=`<div class="error-box"><h3>❌ ${titulo}</h3><pre>${detalle}</pre>
  <ul><li>¿El token de Google expiró? → Cerrá sesión y volvé a entrar</li>
  <li>¿Los scopes de Drive están habilitados en GCP?</li>
  <li>¿web.sibra@gmail.com tiene acceso a los archivos?</li></ul>
  <button onclick="location.reload()" class="btn btn-ghost" style="margin-top:12px">↺ Reintentar</button></div>`;
}

//  AUTH — sesión compartida con el resto de Market Suite
//  (ver shared/sibra-auth.js; antes usaba redirect de página completa +
//  sessionStorage propio, por eso no persistía entre módulos)
// ══════════════════════════════════════════════════════
const Auth = {
  async login(){
    try{
      S.token = await SibraAuth.connect();
      await Auth.cargarUsuario(); // no-fatal
      Auth.mostrarApp();
    }catch(e){ toast("Error de login: "+e.message, "error"); }
  },

  logout(){
    SibraAuth.logout();
    sessionStorage.removeItem("sb_user");
    location.reload();
  },

  async init(){
    const saved = SibraAuth.getToken();
    if(saved){
      S.token = saved;
      const u = sessionStorage.getItem("sb_user");
      if(u){
        S.usuario = JSON.parse(u);
        Auth.mostrarApp();
        return;
      }
      await Auth.cargarUsuario(); // no-fatal
      Auth.mostrarApp();
      return;
    }
    // Mostrar pantalla de login
    $("login-screen").style.display = "flex";
  },

  async cargarUsuario(){
    // No-fatal: si falla el userinfo la app igual arranca
    try{
      const r = await fetch("https://www.googleapis.com/oauth2/v3/userinfo",{
        headers: {Authorization:"Bearer "+S.token}
      });
      if(r.ok){ S.usuario = await r.json(); sessionStorage.setItem("sb_user", JSON.stringify(S.usuario)); }
    }catch(e){ console.warn("[Auth] userinfo no disponible:", e.message); }
  },

  mostrarApp(){
    $("login-screen").style.display = "none";
    $("app").style.display = "flex";
    $("user-name").textContent = S.usuario?.name || "";
    $("user-avatar").src = S.usuario?.picture || "";
    App.inicializar();
  },

  hdrs(){ return {Authorization:"Bearer "+S.token}; },
};

// ══════════════════════════════════════════════════════
//  DRIVE API — solo fetch REST, sin SDK
// ══════════════════════════════════════════════════════
const Drive = {
  BASE:   "https://www.googleapis.com",
  SHEETS: "https://sheets.googleapis.com",

  async listar(folderId){
    const q = encodeURIComponent(`'${folderId}' in parents and trashed = false`);
    const url = `${Drive.BASE}/drive/v3/files?q=${q}&orderBy=modifiedTime+desc&fields=files(id,name,modifiedTime,mimeType)&pageSize=200`;
    const r = await fetch(url, {headers: Auth.hdrs()});
    if(!r.ok){ const t=await r.text(); throw new Error(`Drive lista ${r.status}: ${t}`); }
    return (await r.json()).files || [];
  },

  async bajar(fileId){
    const r = await fetch(`${Drive.BASE}/drive/v3/files/${fileId}?alt=media`,{headers:{"Authorization":"Bearer "+S.token}});
    if(!r.ok){
      // Google Sheets nativos no se pueden bajar con alt=media → exportar como xlsx
      const xlsx="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";
      const r2 = await fetch(`${Drive.BASE}/drive/v3/files/${fileId}/export?mimeType=${encodeURIComponent(xlsx)}`,{headers:{"Authorization":"Bearer "+S.token}});
      if(!r2.ok){ const t=await r2.text(); throw new Error(`Drive descarga ${r.status}: ${t}`); }
      return r2.arrayBuffer();
    }
    return r.arrayBuffer();
  },

  async buscarPorNombre(folderId, nombre){
    const q = encodeURIComponent(`'${folderId}' in parents and name='${nombre}' and trashed=false`);
    const r = await fetch(`${Drive.BASE}/drive/v3/files?q=${q}&fields=files(id,name)`,{headers:Auth.hdrs()});
    return (await r.json()).files||[];
  },

  async crearSheet(folderId, nombre, headers){
    // Crear spreadsheet vacío vía Sheets API
    const r1 = await fetch(`${Drive.SHEETS}/v4/spreadsheets`,{
      method:"POST", headers:{...Auth.hdrs(),"Content-Type":"application/json"},
      body: JSON.stringify({properties:{title:nombre}})
    });
    if(!r1.ok) throw new Error(`Crear sheet ${r1.status}`);
    const sh = await r1.json();
    const sid = sh.spreadsheetId;
    // Mover a carpeta
    const m = await fetch(`${Drive.BASE}/drive/v3/files/${sid}?fields=parents`,{headers:Auth.hdrs()});
    const md = await m.json();
    const prev = (md.parents||[]).join(",");
    await fetch(`${Drive.BASE}/drive/v3/files/${sid}?addParents=${folderId}&removeParents=${prev}`,{
      method:"PATCH", headers:{...Auth.hdrs(),"Content-Type":"application/json"}, body:"{}"
    });
    // Escribir headers
    await Drive.appendFilas(sid,[headers]);
    return sid;
  },

  async appendFilas(sheetId, filas){
    if(!filas.length) return;
    const url = `${Drive.SHEETS}/v4/spreadsheets/${sheetId}/values/A1:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`;
    await fetch(url,{method:"POST",headers:{...Auth.hdrs(),"Content-Type":"application/json"},body:JSON.stringify({values:filas})});
  },

  async borrarFilasCC(sheetId, cc){
    const url = `${Drive.SHEETS}/v4/spreadsheets/${sheetId}/values/A:F`;
    const r = await fetch(url,{headers:Auth.hdrs()});
    if(!r.ok) return;
    const rows = (await r.json()).values||[];
    const idxs = [];
    for(let i=1;i<rows.length;i++) if(String(rows[i][2]||"").trim()===String(cc).trim()) idxs.push(i);
    if(!idxs.length) return;
    const reqs = idxs.reverse().map(i=>({deleteDimension:{range:{sheetId:0,dimension:"ROWS",startIndex:i,endIndex:i+1}}}));
    await fetch(`${Drive.SHEETS}/v4/spreadsheets/${sheetId}:batchUpdate`,{
      method:"POST",headers:{...Auth.hdrs(),"Content-Type":"application/json"},body:JSON.stringify({requests:reqs})
    });
  },

  leerXlsx(buf){
    const wb = XLSX.read(buf,{type:"array"});
    const res = {};
    for(const n of wb.SheetNames) res[n] = XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,defval:""});
    return res;
  },
};

//  PRECIOS — data912.com/live
// ══════════════════════════════════════════════════════
const Precios = {
  async cargarTodos(){
    try{
      const resultados = await Promise.allSettled(
        CFG.DATA912.PANELES.map(p => fetch(`${CFG.DATA912.BASE}/${p}`).then(r=>r.json()))
      );
      S.precios = {};
      for(const res of resultados){
        if(res.status!=="fulfilled") continue;
        const items = Array.isArray(res.value) ? res.value : [];
        for(const item of items){
          const sym = String(item.symbol||item.ticker||"").trim().toUpperCase();
          const c   = parseFloat(item.c||item.price||item.last||0);
          if(sym && c>0) S.precios[sym] = esRF(sym) ? c/100 : c;
        }
      }
      // MEP = AL30 / AL30D
      const al30=S.precios["AL30"], al30d=S.precios["AL30D"];
      if(al30&&al30d&&al30d>0) S.tipoCambio = al30/al30d;
      const hora = new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
      $("precio-tc").textContent = `TC: $${S.tipoCambio?.toFixed(0)||"—"}`;
      $("precio-hora").textContent = `(${hora})`;
      console.log("[Precios] OK —",Object.keys(S.precios).length,"tickers. MEP:",S.tipoCambio?.toFixed(2));
    }catch(e){
      console.warn("[Precios] Sin datos live:",e.message);
      $("precio-tc").textContent = "TC: —";
    }
  },
  get(ticker){ return S.precios[String(ticker||"").toUpperCase()]||null; },
};

// ══════════════════════════════════════════════════════
//  DATOS — lectura desde Drive
// ══════════════════════════════════════════════════════
const Datos = {
  // ── Clientes ─────────────────────────────────────────
  async cargarClientes(){
    const archivos = await Drive.listar(CFG.DRIVE.CARPETA_CLIENTES);
    const xlsx = archivos.find(f=>f.name.toLowerCase().includes("clientes"));
    if(!xlsx) throw new Error("No se encontró archivo de clientes en Drive");
    const buf  = await Drive.bajar(xlsx.id);
    const hojas = Drive.leerXlsx(buf);
    const rows  = hojas[Object.keys(hojas)[0]] || [];
    // Fila 0 = headers
    S.clientes = rows.slice(1)
      .filter(r => String(r[0]||"").trim() && String(r[3]||"").trim())
      .map(r => ({
        cc:      String(r[0]||"").trim(),
        cliente: String(r[1]||"").trim(),
        cuit:    String(r[2]||"").trim(),
        alyc:    String(r[3]||"").trim().toUpperCase(),
        monto:   parseFloat(String(r[4]||"0").replace(/[$,\s]/g,""))||0,
        perfil:  String(r[5]||"AGRESIVO").trim().toUpperCase(),
        LP:      normPct(r[6]),
        MP:      normPct(r[7]),
        CP:      normPct(r[8]),
        CASH:    normPct(r[9]),
        palanca: normPct(r[10]),
        activo:  String(r[11]||"").trim() !== "",
        caucionPesosFijo:   parseFloat(String(r[13]||"0").replace(/[$,\s]/g,""))||0,
        caucionDolaresFijo: parseFloat(String(r[14]||"0").replace(/[$,\s]/g,""))||0,
      }))
      .filter(c => c.activo && CFG.ALYCS_SOPORTADAS.includes(c.alyc));
    console.log("[Clientes]",S.clientes.length,"cargados");
    return S.clientes;
  },

  // ── Carteras modelo ───────────────────────────────────
  async cargarCarteras(){
    const archivos = await Drive.listar(CFG.DRIVE.CARPETA_PAPELES);
    const xlsx = archivos[0];
    if(!xlsx) throw new Error("No se encontró archivo de carteras en Drive");
    const buf   = await Drive.bajar(xlsx.id);
    const hojas = Drive.leerXlsx(buf);
    S.carteras  = {AGRESIVO:[], MODERADO:[], CONSERVADOR:[]};

    // La hoja correcta se llama "CARTERA"
    // Estructura: col0=PLAZO, col1=PONDERACION, col2=PAPEL, col6=PERFIL
    // Fila 3 (índice 2) = headers, datos desde fila 4 (índice 3)
    const nombreHoja = Object.keys(hojas).find(n=>n.toUpperCase()==="CARTERA") || Object.keys(hojas)[0];
    const rows = hojas[nombreHoja] || [];

    // Encontrar fila de headers buscando "PLAZO"
    let dataStart = 3; // default
    for(let i=0;i<Math.min(10,rows.length);i++){
      const r = rows[i].map(v=>String(v||"").toUpperCase());
      if(r[0]==="PLAZO" && r[2]==="PAPEL"){ dataStart=i+1; break; }
    }

    for(let i=dataStart; i<rows.length; i++){
      const row    = rows[i];
      const plazo  = String(row[0]||"").trim().toUpperCase();
      const pond   = parseFloat(row[1])||0;   // PONDERACION EN CARTERA (decimal)
      const papel  = String(row[2]||"").trim().toUpperCase();
      const perfil = String(row[6]||"").trim().toUpperCase();

      // Saltar filas inválidas o PALANCA
      if(!plazo||!papel||!perfil) continue;
      if(plazo==="PALANCA") continue;         // la caución tomadora no es posición a comprar
      if(pond<=0) continue;
      if(!(perfil in S.carteras)) continue;

      S.carteras[perfil].push({ plazo, ticker: papel, pond_plazo: pond });
    }

    // Log diagnóstico
    for(const p of ["AGRESIVO","MODERADO","CONSERVADOR"]){
      console.log(`[Carteras] ${p}: ${S.carteras[p].length} tickers`);
    }
    return S.carteras;
  },

  // ── Propuestas (cartera objetivo por comitente) ───────
  async cargarPropuestas(){
    const archivos = await Drive.listar(CFG.DRIVE.CARPETA_PROPUESTAS);
    const xlsx = archivos[0];
    if(!xlsx) throw new Error("No se encontró archivo de propuestas en Drive");
    const buf   = await Drive.bajar(xlsx.id);
    const hojas = Drive.leerXlsx(buf);
    const hoja  = Object.values(hojas)[0] || [];
    const header = hoja[0] || [];
    const iCC     = header.findIndex(h => String(h||"").trim() === "Cuenta Comitente");
    const iTicker = header.findIndex(h => String(h||"").trim() === "Ticker");
    const iPct    = header.findIndex(h => String(h||"").trim() === "% Final");
    if(iCC < 0 || iTicker < 0 || iPct < 0)
      throw new Error("Formato inesperado en archivo de propuestas (faltan columnas)");
    S.propuestas = {};
    for(let i = 1; i < hoja.length; i++){
      const row    = hoja[i];
      const cc     = String(row[iCC]    || "").trim();
      const ticker = String(row[iTicker]|| "").trim().toUpperCase();
      const v      = parseFloat(row[iPct]) || 0;
      const pct    = v > 1 ? v / 100 : v;
      if(!cc || !ticker || pct <= 0) continue;
      if(!S.propuestas[cc]) S.propuestas[cc] = {};
      S.propuestas[cc][ticker] = pct;
    }
    console.log("[Propuestas] CCs:", Object.keys(S.propuestas).length, "— archivo:", xlsx.name);
    return S.propuestas;
  },

  // ── Tenencias + cauciones: fuente única SibraBrokers (Sheet TENENCIAS/
  //    CAUCIONES.CURRENT, alimentado automáticamente por sibra-brokers-repo).
  //    Reemplaza el parseo de Excel por-ALyC que se subía a mano a Drive.
  _filaATenencia(t){
    if(t.esEfectivo) return null;
    if(!(t.cantidad>0)) return null;
    return {
      ticker: t.ticker, especie: t.tipo||t.ticker, cantidad: t.cantidad,
      pu: Precios.get(t.ticker)||t.precio, importe: t.valor||(t.cantidad*t.precio),
      esFondo: t.tipo==='FCI',
    };
  },

  async _agruparTenencias(fresh=false){
    const [filas, cauc] = await Promise.all([
      SibraBrokers.loadTenencias({fresh}),
      SibraBrokers.loadCauciones({fresh}),
    ]);
    const caucByAcc = cauc.caucionByAccount();
    const caucionDe = (alyc,cc) => {
      const ccNorm=normCC(cc);
      for(const key in caucByAcc){
        const [b,acc]=key.split('|');
        if(b===alyc && normCC(acc)===ccNorm) return caucByAcc[key];
      }
      return {ars:0,usd:0};
    };

    const porCliente={};
    for(const cl of S.clientes){
      const propias=filas.filter(t=>t.alyc===cl.alyc && normCC(t.comitente)===normCC(cl.cc));
      let cashPesos=0, cashUSD=0;
      const pos=[];
      for(const t of propias){
        if(t.esEfectivo){
          if(t.bucket==='ARS') cashPesos+=t.cantidad; else cashUSD+=t.cantidad;
          continue;
        }
        const p=Datos._filaATenencia(t);
        if(p) pos.push(p);
      }
      const c=caucionDe(cl.alyc,cl.cc);
      porCliente[cl.cc]={cashPesos, cashUSD, caucionPesos:c.ars, posiciones:pos};
    }
    return porCliente;
  },

  // ── Cargar TODAS las tenencias de una vez (botón "Cargar tenencias") ──
  async cargarTodasLasTenencias(){
    showLoad('Leyendo tenencias y cauciones (base sibra-brokers)...');
    try{
      S.tenencias = await Datos._agruparTenencias(true);
      hideLoad();
      const n=Object.keys(S.tenencias).length;
      toast(`✓ ${n} tenencias cargadas`);
      return S.tenencias;
    }catch(e){
      hideLoad(); toast('Error cargando tenencias: '+e.message,'error'); throw e;
    }
  },

  // ── Cargar tenencia de UN cliente (fallback si no se usó el botón de arriba) ──
  async cargarTenencia(alyc, cc){
    const [filas, cauc] = await Promise.all([
      SibraBrokers.loadTenencias(),
      SibraBrokers.loadCauciones(),
    ]);
    const ccNorm=normCC(cc);
    const propias=filas.filter(t=>t.alyc===alyc && normCC(t.comitente)===ccNorm);
    if(!propias.length) throw new Error(`Sin tenencia para comitente ${cc} en ${alyc}`);

    let cashPesos=0, cashUSD=0;
    const pos=[];
    for(const t of propias){
      if(t.esEfectivo){
        if(t.bucket==='ARS') cashPesos+=t.cantidad; else cashUSD+=t.cantidad;
        continue;
      }
      const p=Datos._filaATenencia(t);
      if(p) pos.push(p);
    }
    const byAcc=cauc.caucionByAccount();
    let caucionPesos=0;
    for(const key in byAcc){
      const [b,acc]=key.split('|');
      if(b===alyc && normCC(acc)===ccNorm){ caucionPesos=byAcc[key].ars; break; }
    }
    return {cashPesos, cashUSD, caucionPesos, posiciones:pos};
  },
};

// ══════════════════════════════════════════════════════
//  CALCULOS
// ══════════════════════════════════════════════════════
const Calc = {
  objetivo(cliente){
    return { ...(S.propuestas[String(cliente.cc).trim()] || {}) };
  },

  base(ten, aporteARS, aporteUSD, palanca){
    const tc=S.tipoCambio||0;
    const valPos=ten.posiciones.reduce((s,p)=>s+p.cantidad*p.pu,0);
    const total=valPos+ten.cashPesos+ten.caucionPesos;
    const ajustado=total+aporteARS+(aporteUSD*tc);
    return {totalCartera:total,totalAjustado:ajustado,base:ajustado*(1+(palanca||0))};
  },

  ventas(ten, obj, base, pctV, comV, gasV){
    return ten.posiciones.map(pos=>{
      const t=pos.ticker;
      const pu=Precios.get(t)||pos.pu;
      const pctObj=obj[t]||0;
      const cantObj=(pctObj>0&&pu>0)?fl((base*pctObj)/pu):0;
      const delta=cantObj-pos.cantidad;
      const esV=delta<0;
      const cantBase=esV?Math.abs(delta):0;
      const pEj=pctV[t]!==undefined?pctV[t]:1;
      const cantOp=esV?fl(cantBase*pEj):0;
      const monto=cantOp*pu;
      const com=monto*(comV+gasV);
      return {ticker:t,cantActual:pos.cantidad,cantObj,delta,esV,cantBase,pEj,cantOp,pu,monto,com,neto:monto-com};
    });
  },

  disponible(ventas, ten, aARS, aUSD, totalAjustado, palanca){
    const tc=S.tipoCambio||0;
    const prestamo=(totalAjustado||0)*(palanca||0);
    return ventas.filter(v=>v.esV).reduce((s,v)=>s+v.neto,0)+ten.cashPesos+aARS+(aUSD*tc)+prestamo;
  },

  compras(ten, ventas, obj, base, pctC, comC, gasC){
    const actMap={},vendMap={};
    ten.posiciones.forEach(p=>actMap[p.ticker]=p.cantidad);
    ventas.filter(v=>v.esV).forEach(v=>vendMap[v.ticker]=v.cantOp);
    return Object.entries(obj).map(([t,pctObj])=>{
      const pu=Precios.get(t)||0; if(!pu) return null;
      const act=actMap[t]||0, vend=vendMap[t]||0, post=act-vend;
      const cantObj=fl((base*pctObj)/pu);
      const delta=cantObj-post;
      const esC=delta>0;
      const pEj=pctC[t]!==undefined?pctC[t]:1;
      const cantOp=esC?fl(delta*pEj):0;
      const monto=cantOp*pu, com=monto*(comC+gasC);
      return {ticker:t,act,vend,post,cantObj,delta,esC,pEj,cantOp,pu,monto,com,total:monto+com,pctObj};
    }).filter(Boolean);
  },

  saldo(disp, compras){
    const nec=compras.filter(c=>c.esC).reduce((s,c)=>s+c.total,0);
    return {nec,saldo:disp-nec,ok:disp>=nec};
  },

  resultante(ten, ventas, compras){
    const m={};
    ten.posiciones.forEach(p=>m[p.ticker]=p.cantidad);
    ventas.filter(v=>v.esV).forEach(v=>m[v.ticker]=(m[v.ticker]||0)-v.cantOp);
    compras.filter(c=>c.esC).forEach(c=>m[c.ticker]=(m[c.ticker]||0)+c.cantOp);
    return Object.entries(m).map(([t,n])=>({ticker:t,cantidad:n})).filter(p=>p.cantidad>0);
  },

  ordenes(cliente, alyc, ventas, compras){
    const h=hoy(), u=S.usuario?.name||"", ords=[];
    ventas.filter(v=>v.esV&&v.cantOp>0).forEach(v=>{
      ords.push([uid(),h,u,u,alyc,cliente.cc,"","VENTA",v.ticker,CFG.PLAZO,-v.cantOp,v.pu,CFG.MONEDA,v.monto,""]);
    });
    compras.filter(c=>c.esC&&c.cantOp>0).forEach(c=>{
      ords.push([uid(),h,u,u,alyc,cliente.cc,"","COMPRA",c.ticker,CFG.PLAZO,c.cantOp,c.pu,CFG.MONEDA,c.monto,""]);
    });
    return ords;
  },
};

const App = {
  async inicializar(){
    showLoad("Cargando clientes...");
    try{ await Datos.cargarClientes(); }
    catch(e){ hideLoad(); errBox("Error cargando clientes",e.message); return; }

    showLoad("Cargando propuestas...");
    try{ await Datos.cargarPropuestas(); }
    catch(e){ hideLoad(); errBox("Error cargando propuestas",e.message); return; }

    showLoad("Cargando precios live...");
    await Precios.cargarTodos(); // no-fatal

    UI.initSelectores();
    hideLoad();
    toast("Sistema listo — "+S.clientes.length+" clientes");
  },

  async actualizarPrecios(){
    showLoad("Actualizando precios..."); await Precios.cargarTodos(); hideLoad();
    if(S.clienteActual) App.render();
  },

  async selCliente(cliente){
    S.clienteActual=cliente; S.alycSel=cliente.alyc;
    S.aporteARS=0; S.aporteUSD=0; S.palancaAjuste=null;
    S.pctV={}; S.pctC={}; S.tenencia=null;
    S.objetivo=Calc.objetivo(cliente);
    // Usar caché si ya se cargaron todas las tenencias
    if(S.tenencias[cliente.cc]){
      const ten=S.tenencias[cliente.cc];
      ten.posiciones=ten.posiciones.map(p=>({...p,pu:Precios.get(p.ticker)||p.pu}));
      S.tenencia=ten;
      UI.setTab("inicial"); App.render();
      return;
    }
    showLoad(`Cargando tenencia de ${cliente.cliente}...`);
    try{
      const ten=await Datos.cargarTenencia(cliente.alyc,cliente.cc);
      ten.posiciones=ten.posiciones.map(p=>({...p,pu:Precios.get(p.ticker)||p.pu}));
      S.tenencias[cliente.cc]=ten;
      S.tenencia=ten; hideLoad();
      UI.setTab("inicial"); App.render();
    }catch(e){
      hideLoad(); toast("Error tenencia: "+e.message,"error"); console.error(e);
    }
  },

  render(){
    if(!S.clienteActual||!S.tenencia) return;
    const palanca=S.palancaAjuste!==null?S.palancaAjuste:(S.clienteActual.palanca||0);
    const {totalCartera,totalAjustado,base}=Calc.base(S.tenencia,S.aporteARS,S.aporteUSD,palanca);
    const ventas=Calc.ventas(S.tenencia,S.objetivo,base,S.pctV,S.comV,S.gasV);
    const disp=Calc.disponible(ventas,S.tenencia,S.aporteARS,S.aporteUSD,totalAjustado,palanca);
    const compras=Calc.compras(S.tenencia,ventas,S.objetivo,base,S.pctC,S.comC,S.gasC);
    const {nec,saldo,ok}=Calc.saldo(disp,compras);
    UI.renderInicial(ventas,totalCartera,totalAjustado,base,disp,palanca);
    UI.renderObjetivo(compras,ventas,disp,nec,saldo,ok,base,totalAjustado,palanca);
  },

  async guardar(){
    const {clienteActual:cl,alycSel:alyc,tenencia,objetivo}=S;
    if(!cl||!tenencia) return;
    const palanca=S.palancaAjuste!==null?S.palancaAjuste:(cl.palanca||0);
    const {base,totalAjustado}=Calc.base(tenencia,S.aporteARS,S.aporteUSD,palanca);
    const ventas=Calc.ventas(tenencia,objetivo,base,S.pctV,S.comV,S.gasV);
    const disp=Calc.disponible(ventas,tenencia,S.aporteARS,S.aporteUSD,totalAjustado,palanca);
    const compras=Calc.compras(tenencia,ventas,objetivo,base,S.pctC,S.comC,S.gasC);
    const {ok}=Calc.saldo(disp,compras);
    if(!ok){ toast("Saldo insuficiente","error"); return; }

    showLoad("Guardando rotación...");
    try{
      const h=hoy();
      // 04 — Rotaciones
      const nomRot=`${alyc}_${h}`;
      const hRot=["ID","Fecha","Solicita","Operador","Alyc","Comitente","Cuenta Rofex","Operación","Especie","Plazo","Cantidad","Precio","Moneda","Monto Bruto","Observaciones"];
      const exRot=await Drive.buscarPorNombre(CFG.DRIVE.CARPETA_ROTACIONES,nomRot);
      const rotId=exRot.length?exRot[0].id:await Drive.crearSheet(CFG.DRIVE.CARPETA_ROTACIONES,nomRot,hRot);
      await Drive.appendFilas(rotId,Calc.ordenes(cl,alyc,ventas,compras));

      // 05 — Resultantes
      const hRes=["FECHA","ALYC","CC","TITULAR","TICKER","CANTIDAD"];
      const exRes=await Drive.buscarPorNombre(CFG.DRIVE.CARPETA_RESULTANTES,h);
      const resId=exRes.length?exRes[0].id:await Drive.crearSheet(CFG.DRIVE.CARPETA_RESULTANTES,h,hRes);
      if(exRes.length) await Drive.borrarFilasCC(resId,cl.cc);
      const resultante=Calc.resultante(tenencia,ventas,compras);
      await Drive.appendFilas(resId,resultante.map(p=>[h,alyc,cl.cc,cl.cliente,p.ticker,p.cantidad]));

      hideLoad();
      toast(`✓ Guardado: ${cl.cliente}`);
      App.siguienteCliente();
    }catch(e){
      hideLoad(); toast("Error guardando: "+e.message,"error"); console.error(e);
    }
  },

  siguienteCliente(){
    const lista=S.clientes.filter(c=>c.alyc===S.alycSel);
    const idx=lista.findIndex(c=>c.cc===S.clienteActual?.cc);
    if(idx>=0&&idx<lista.length-1){
      App.selCliente(lista[idx+1]);
      UI.setInputCom(lista[idx+1]);
    } else {
      S.clienteActual=null; S.tenencia=null;
      $("pane-inicial").innerHTML=""; $("pane-objetivo").innerHTML="";
      toast("Fin de lista para "+S.alycSel);
    }
  },

  pasarSinOperar(){ App.siguienteCliente(); },
};

// ══════════════════════════════════════════════════════
//  UI
// ══════════════════════════════════════════════════════
const UI = {
  initSelectores(){
    UI._alycs=[...new Set(S.clientes.map(c=>c.alyc))].sort();
  },

  filtrar(tipo, val){
    if(tipo==="alyc"){
      const drop=$("drop-alyc");
      const items=UI._alycs.filter(a=>a.toLowerCase().includes(val.toLowerCase()));
      drop.innerHTML=items.map(a=>`<div class="autocomplete-item" onmousedown="UI.selAlyc('${a}')">${a}</div>`).join("");
      drop.style.display=items.length?"block":"none";
    } else {
      if(!S.alycSel) return;
      const lista=S.clientes.filter(c=>c.alyc===S.alycSel);
      const drop=$("drop-com");
      const items=lista.filter(c=>(c.cc+c.cliente).toLowerCase().includes(val.toLowerCase()));
      drop.innerHTML=items.map(c=>`<div class="autocomplete-item" onmousedown="UI.selCom('${c.cc}')">${c.cc} — ${c.cliente}</div>`).join("");
      drop.style.display=items.length?"block":"none";
    }
  },

  abrirDrop(tipo){
    if(tipo==="alyc"){
      const drop=$("drop-alyc");
      drop.innerHTML=UI._alycs.map(a=>`<div class="autocomplete-item" onmousedown="UI.selAlyc('${a}')">${a}</div>`).join("");
      drop.style.display="block";
    } else {
      if(!S.alycSel){ toast("Elegí una ALYC primero","error"); return; }
      const lista=S.clientes.filter(c=>c.alyc===S.alycSel);
      const drop=$("drop-com");
      drop.innerHTML=lista.map(c=>`<div class="autocomplete-item" onmousedown="UI.selCom('${c.cc}')">${c.cc} — ${c.cliente}</div>`).join("");
      drop.style.display="block";
    }
  },

  cerrarDrop(tipo){ $(tipo==="alyc"?"drop-alyc":"drop-com").style.display="none"; },

  selAlyc(alyc){
    S.alycSel=alyc;
    $("input-alyc").value=alyc;
    $("drop-alyc").style.display="none";
    $("input-comitente").value="";
    S.clienteActual=null; S.tenencia=null;
    $("pane-inicial").innerHTML=""; $("pane-objetivo").innerHTML="";
  },

  selCom(cc){
    const cl=S.clientes.find(c=>c.cc===cc); if(!cl) return;
    $("input-comitente").value=`${cl.cc} — ${cl.cliente}`;
    $("drop-com").style.display="none";
    App.selCliente(cl);
  },

  setInputCom(cl){ $("input-comitente").value=`${cl.cc} — ${cl.cliente}`; },

  setTab(tab){
    S.tab=tab;
    $("tab-inicial").className="tab"+(tab==="inicial"?" active":"");
    $("tab-objetivo").className="tab"+(tab==="objetivo"?" active":"");
    $("pane-inicial").style.display=tab==="inicial"?"block":"none";
    $("pane-objetivo").style.display=tab==="objetivo"?"block":"none";
  },

  pctCtrl(tipo, ticker, val){
    return `<div class="pct-control">
      <button class="pct-btn" onclick="UI.adjPct('${tipo}','${ticker}',-0.05)">−5</button>
      <input class="input-field pct-input" type="number" min="0" max="100" value="${Math.round(val*100)}"
        onchange="UI.setPct('${tipo}','${ticker}',Number(this.value)/100)"/>
      <button class="pct-btn" onclick="UI.adjPct('${tipo}','${ticker}',0.01)">+1</button>
    </div>`;
  },
  adjPct(tipo,t,d){ const m=tipo==="v"?S.pctV:S.pctC; m[t]=Math.min(1,Math.max(0,(m[t]!==undefined?m[t]:1)+d)); App.render(); },
  setPct(tipo,t,v){ const m=tipo==="v"?S.pctV:S.pctC; m[t]=Math.min(1,Math.max(0,v)); App.render(); },

  renderInicial(ventas, totalCartera, totalAjustado, base, disp, palanca){
    const ten=S.tenencia;
    const vF=ventas.filter(v=>v.esV);
    const bruto=vF.reduce((s,v)=>s+v.monto,0);
    const comTot=vF.reduce((s,v)=>s+v.com,0);
    $("pane-inicial").innerHTML=`
    <div class="grid2">
      <div>
        <div class="section-title">${S.clienteActual.cliente} · ${S.clienteActual.cc} · ${S.clienteActual.alyc}</div>
        ${(()=>{
          const cl=S.clienteActual;
          const tc=S.tipoCambio||0;
          const caucARS=(cl.caucionPesosFijo||0)+((cl.caucionDolaresFijo||0)*tc);
          const caucPct=totalCartera>0?caucARS/totalCartera:0;
          const plazos=[
            {lbl:"Largo Plazo",  k:"LP",   v:cl.LP},
            {lbl:"Mediano Plazo",k:"MP",   v:cl.MP},
            {lbl:"Corto Plazo",  k:"CP",   v:cl.CP},
            {lbl:"Cash",         k:"CASH", v:cl.CASH},
            {lbl:"Palanca",      k:"PAL",  v:cl.palanca},
          ];
          return `
        <div class="card" style="margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
            <span style="font-size:10px;font-weight:700;letter-spacing:1px;background:var(--red);color:#fff;padding:3px 10px">${cl.perfil}</span>
            ${caucARS>0?`<span style="font-size:10px;color:var(--text3)">Caución actual: <b style="color:var(--text)">${fmt(caucARS)}</b> · <b style="color:var(--text)">${pct(caucPct)}</b> de la cartera</span>`:""}
          </div>
          <div class="card-grid" style="grid-template-columns:repeat(5,1fr);gap:6px">
            ${plazos.map(p=>`<div style="background:var(--bg3);border:1px solid var(--border);padding:8px;text-align:center">
              <div style="font-size:9px;color:var(--text3);letter-spacing:1px;margin-bottom:4px">${p.lbl}</div>
              <div style="font-size:13px;font-weight:700;color:var(--text)">${pct(p.v)}</div>
              <div style="font-size:10px;color:var(--text2);margin-top:2px">${fmt(totalCartera*p.v)}</div>
            </div>`).join("")}
          </div>
        </div>`;
        })()}
        <div class="card-grid g3">
          <div class="card"><div class="label">Total cartera</div><div class="value" style="font-size:13px">${fmt(totalCartera)}</div></div>
          <div class="card"><div class="label">Cash pesos</div><div class="value-sm">${fmt(ten.cashPesos)}</div></div>
          <div class="card"><div class="label">Caución tomadora</div><div class="value-sm">${fmt(ten.caucionPesos)}</div></div>
        </div>
        <div class="card" style="margin-bottom:8px">
          <div class="label" style="margin-bottom:8px">Flujos de caja</div>
          <div class="card-grid g2">
            <div><div style="font-size:9px;color:var(--text3);margin-bottom:4px">Aporte/Retiro ARS</div>
              <input class="input-field" type="number" value="${S.aporteARS}" onchange="S.aporteARS=Number(this.value);App.render()"/></div>
            <div><div style="font-size:9px;color:var(--text3);margin-bottom:4px">Aporte/Retiro USD</div>
              <input class="input-field" type="number" value="${S.aporteUSD}" onchange="S.aporteUSD=Number(this.value);App.render()"/></div>
          </div>
        </div>
        <div class="card" style="margin-bottom:8px">
          <div class="label" style="margin-bottom:8px">Comisiones (%)</div>
          <div class="card-grid g4">
            <div><div style="font-size:9px;color:var(--text3);margin-bottom:4px">Com.Venta</div><input class="input-field" type="number" step="0.01" value="${(S.comV*100).toFixed(2)}" onchange="S.comV=Number(this.value)/100;App.render()"/></div>
            <div><div style="font-size:9px;color:var(--text3);margin-bottom:4px">Gas.Venta</div><input class="input-field" type="number" step="0.01" value="${(S.gasV*100).toFixed(2)}" onchange="S.gasV=Number(this.value)/100;App.render()"/></div>
            <div><div style="font-size:9px;color:var(--text3);margin-bottom:4px">Com.Compra</div><input class="input-field" type="number" step="0.01" value="${(S.comC*100).toFixed(2)}" onchange="S.comC=Number(this.value)/100;App.render()"/></div>
            <div><div style="font-size:9px;color:var(--text3);margin-bottom:4px">Gas.Compra</div><input class="input-field" type="number" step="0.01" value="${(S.gasC*100).toFixed(2)}" onchange="S.gasC=Number(this.value)/100;App.render()"/></div>
          </div>
        </div>
        <div class="tbl-wrap">
          <table><thead><tr><th>Ticker</th><th>Cantidad</th><th>PU</th><th>Total ARS</th></tr></thead>
          <tbody>${ten.posiciones.map(p=>`<tr><td>${p.ticker}${p.esFondo?` <span style="font-size:9px;color:var(--text3)">(FCI)</span>`:""}</td><td>${fmtN(p.cantidad)}</td><td>${fmt(p.pu)}</td><td>${fmt(p.cantidad*p.pu)}</td></tr>`).join("")}</tbody></table>
        </div>
      </div>
      <div>
        <div class="section-title">Ventas sugeridas</div>
        <div class="card-grid g3">
          <div class="card"><div class="label">Bruto ventas</div><div class="value-sm">${fmt(bruto)}</div></div>
          <div class="card"><div class="label">Comisiones</div><div class="value-sm" style="color:var(--red-light)">−${fmt(comTot)}</div></div>
          <div class="card" style="border-color:var(--blue)"><div class="label">Disponible neto</div><div class="value" style="font-size:13px;color:var(--blue)">${fmt(disp)}</div></div>
        </div>
        <div class="tbl-wrap" style="margin-bottom:12px">
          <table><thead><tr><th>Ticker</th><th>Actual</th><th>Objetivo</th><th>% Ejecutar</th><th>Operar</th><th>PU</th><th>Monto</th><th>Comisión</th></tr></thead>
          <tbody>${vF.length===0?`<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:20px">Sin ventas sugeridas</td></tr>`:
            vF.map(v=>`<tr>
              <td>${v.ticker}</td><td>${fmtN(v.cantActual)}</td><td>${fmtN(v.cantObj)}</td>
              <td>${UI.pctCtrl("v",v.ticker,v.pEj)}</td>
              <td style="color:var(--red-light)">${fmtN(v.cantOp)}</td>
              <td>${fmt(v.pu)}</td><td>${fmt(v.monto)}</td>
              <td style="color:var(--red-light)">−${fmt(v.com)}</td></tr>`).join("")}
          </tbody></table>
        </div>
        <div style="display:flex;justify-content:flex-end">
          <button class="btn btn-red" onclick="UI.setTab('objetivo')">Cartera Objetivo →</button>
        </div>
      </div>
    </div>`;
  },

  renderObjetivo(compras, ventas, disp, nec, saldo, ok, base, totalAjustado, palanca){
    const cF=compras.filter(c=>c.esC);
    $("pane-objetivo").innerHTML=`
    <div class="grid2">
      <div>
        <div class="section-title">Cartera objetivo · ${S.clienteActual.perfil}</div>
        <div class="card" style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div><div class="label">% Apalancamiento</div>
              <div style="font-size:9px;color:var(--text3)">Tabla: ${pct(S.clienteActual.palanca||0)}</div></div>
            <div style="display:flex;align-items:center;gap:6px">
              <input class="input-field" type="number" step="1" min="0" style="width:70px;text-align:center"
                value="${Math.round(palanca*100)}" onchange="S.palancaAjuste=Number(this.value)/100;App.render()"/>
              <span style="font-size:10px;color:var(--text3)">%</span>
            </div>
          </div>
        </div>
        <div class="card-grid g2">
          <div class="card"><div class="label">Base ajustada</div><div class="value-sm">${fmt(totalAjustado)}</div></div>
          <div class="card"><div class="label">Con apalancamiento</div><div class="value-sm">${fmt(base)}</div></div>
        </div>
        <div class="tbl-wrap">
          <table><thead><tr><th>Ticker</th><th>% Obj</th><th>Cant. Obj.</th><th>PU</th><th>Valor ARS</th></tr></thead>
          <tbody>${Object.entries(S.objetivo).map(([t,p])=>{
            const pu=Precios.get(t)||0;
            const cO=pu>0?fl((base*p)/pu):0;
            return `<tr><td>${t}</td><td style="color:#fbbf24">${pct(p)}</td><td>${fmtN(cO)}</td><td>${fmt(pu)}</td><td>${fmt(cO*pu)}</td></tr>`;
          }).join("")}</tbody></table>
        </div>
      </div>
      <div>
        <div class="section-title">Compras sugeridas</div>
        <div class="card-grid g3" style="margin-bottom:8px">
          <div class="card"><div class="label">Disponible</div><div class="value-sm" style="color:var(--blue)">${fmt(disp)}</div></div>
          <div class="card"><div class="label">Necesario</div><div class="value-sm">${fmt(nec)}</div></div>
          <div class="semaforo ${ok?"sem-ok":"sem-mal"}">
            <div class="sem-label">${ok?"✓ SALDO OK":"✗ INSUFICIENTE"}</div>
            <div class="sem-value">${fmt(Math.abs(saldo))}</div>
          </div>
        </div>
        ${!ok?`<div class="warn-box">⚠ Subí el apalancamiento o bajá el % de ejecución de compras.</div>`:""}
        <div class="tbl-wrap" style="margin-bottom:12px">
          <table><thead><tr><th>Ticker</th><th>Post-venta</th><th>Objetivo</th><th>% Ejecutar</th><th>Operar</th><th>PU</th><th>Monto</th><th>Com.</th></tr></thead>
          <tbody>${cF.length===0?`<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:20px">Sin compras sugeridas</td></tr>`:
            cF.map(c=>`<tr>
              <td>${c.ticker}</td><td>${fmtN(c.post)}</td><td>${fmtN(c.cantObj)}</td>
              <td>${UI.pctCtrl("c",c.ticker,c.pEj)}</td>
              <td style="color:var(--green)">${fmtN(c.cantOp)}</td>
              <td>${fmt(c.pu)}</td><td>${fmt(c.monto)}</td>
              <td style="color:var(--red-light)">−${fmt(c.com)}</td></tr>`).join("")}
          </tbody></table>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button class="btn btn-ghost" onclick="App.pasarSinOperar()">Pasar sin operar →</button>
          <button class="btn ${ok?"btn-green":"btn-ghost"}" ${ok?"":"disabled"} onclick="App.guardar()">
            ${ok?"✓ Guardar Rotación":"✗ Saldo insuficiente"}
          </button>
        </div>
      </div>
    </div>`;
  },
};
