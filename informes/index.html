<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIBRA · Informes</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Raleway:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E10600;--red-light:#ff3330;--red-dark:#B00500;
  --bg:#0d0d0d;--bg2:#141414;--bg3:#1a1a1a;--border:#2a2a2a;--border2:#3a3a3a;
  --text:#f5f5f5;--text2:#b8b8b8;--text3:#888;--green:#22c55e;--amber:#fbbf24;--blue:#60a5fa;
  --font-main:'Montserrat',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-main);font-size:13px}
a{color:inherit;text-decoration:none}
.app-header{background:#0b0b0b;border-bottom:2px solid var(--red);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.app-header h1{font-family:'Raleway',sans-serif;font-size:15px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);font-weight:600}
.back-btn{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:5px 12px;border-radius:4px;font-size:11px;display:flex;align-items:center;gap:5px;transition:all .2s}
.back-btn:hover{border-color:var(--red);color:var(--red-light)}
.spacer{flex:1}
main{padding:20px 24px;max-width:1700px;margin:0 auto}
.btn{padding:7px 14px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font-main);font-size:11px;letter-spacing:1px;text-transform:uppercase;border-radius:4px;transition:all .2s}
.btn:hover{border-color:var(--red);color:var(--text)}
.btn-primary{background:var(--red);border-color:var(--red);color:#fff}
.btn-primary:hover{background:var(--red-dark);color:#fff}
.btn.active{border-color:var(--red);color:var(--red-light)}
.tabs{display:flex;gap:6px;flex-wrap:wrap}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.toolbar label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}
select,input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 10px;font-family:var(--font-main);font-size:12px;border-radius:4px;outline:none}
select:focus,input:focus{border-color:var(--red)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:16px}
.card-title{font-family:'Raleway',sans-serif;letter-spacing:1px;text-transform:uppercase;font-size:12px;color:var(--text2);margin-bottom:10px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px}
.kpi .lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.kpi .val{font-size:17px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
th,td{padding:7px 9px;border-bottom:1px solid var(--border);text-align:right}
th:first-child,td:first-child,th:nth-child(2),td:nth-child(2){text-align:left}
th{color:var(--text3);font-size:9px;letter-spacing:.5px;text-transform:uppercase;font-weight:600;background:#0f0f0f;position:sticky;top:0}
tbody tr:hover{background:rgba(255,255,255,.03)}
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:6px;max-height:65vh;overflow-y:auto}
.pos{color:var(--green);font-weight:600}
.neg{color:var(--red-light);font-weight:600}
.status{font-size:11px;color:var(--text3)}
.login{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:24px}
.login h2{font-family:'Raleway',sans-serif;font-size:20px;letter-spacing:2px;text-transform:uppercase;color:var(--text2)}
.login p{color:var(--text3);max-width:420px;line-height:1.6}
.hidden{display:none}
.warn{background:#1c0a0a;border:1px solid #7f1d1d;color:var(--red-light);padding:10px 14px;border-radius:6px;font-size:12px;margin-bottom:16px;line-height:1.5}
.muted{color:var(--text3)}

/* Informe imprimible: agrupado ALyC → cuenta/cliente */
.informe-grupo{background:var(--bg2);border:1px solid var(--border);border-radius:6px;margin-bottom:16px;overflow:hidden}
.informe-grupo-h{background:#0f0f0f;padding:10px 14px;font-family:'Raleway',sans-serif;letter-spacing:1px;text-transform:uppercase;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border)}
.informe-cuenta{padding:12px 14px;border-bottom:1px solid var(--border)}
.informe-cuenta:last-child{border-bottom:none}
.informe-cuenta-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.informe-cuenta-h .nombre{font-weight:600;font-size:13px}
.informe-cuenta-h .cta{color:var(--text3);font-size:11px}
.informe-subtot{display:flex;gap:18px;font-size:11px;color:var(--text2);flex-wrap:wrap}
.informe-subtot b{color:var(--text)}

/* Heatmap */
.hm-tabla{border-collapse:separate;border-spacing:3px}
.hm-tabla th{background:transparent;position:static;color:var(--text3);font-size:10px;padding:2px 6px}
.hm-tabla td{padding:0;border:none}
.hm-cell{min-width:52px;height:34px;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff}
.hm-cell small{font-size:8px;font-weight:400;opacity:.75}
.hm-empty{background:var(--bg3);color:var(--text3);opacity:.4}

@media print{
  body{background:#fff;color:#111;font-size:11px}
  .app-header,.toolbar,.no-print{display:none!important}
  main{max-width:100%;padding:0;margin:0}
  .informe-grupo{background:#fff;border:1px solid #ccc;break-inside:avoid}
  .informe-cuenta{break-inside:avoid;border-bottom:1px solid #ddd}
  .informe-grupo-h{background:#eee;color:#111}
  th{background:#eee;color:#333}
  th,td{border-bottom:1px solid #ddd;color:#111}
  .pos{color:#0a7d2c}.neg{color:#b00500}
}
</style>
</head>
<body>

<div id="login" class="login">
  <h2>SIBRA · Informes</h2>
  <p>Cartera y performance a partir del FIFO del backend: posiciones abiertas, operaciones cerradas, evolución del valor y heatmap de rendimientos. Conectate con Google para leer la base.</p>
  <button class="btn btn-primary" onclick="driveAuth()">Conectar con Google</button>
  <div id="loginErr" class="status"></div>
</div>

<div id="app" class="hidden">
<header class="app-header">
  <a href="../" class="back-btn">← Market Suite</a>
  <h1>Informes</h1>
  <div class="tabs">
    <button class="btn active" id="v-informe"  onclick="setVista('informe')">Informe</button>
    <button class="btn"        id="v-abiertas" onclick="setVista('abiertas')">Abiertas</button>
    <button class="btn"        id="v-cerradas" onclick="setVista('cerradas')">Cerradas</button>
    <button class="btn"        id="v-evolucion" onclick="setVista('evolucion')">Evolución</button>
    <button class="btn"        id="v-heatmap"  onclick="setVista('heatmap')">Heatmap</button>
  </div>
  <div class="spacer"></div>
  <span id="updatedAt" class="status"></span>
  <button class="btn no-print" onclick="cargar(true)">↻</button>
</header>
<main>
  <div id="setupWarn" class="warn hidden"></div>
  <div class="toolbar">
    <label>ALyC</label><select id="alycSel" onchange="render()"></select>
    <label>Cliente</label><select id="clienteSel" onchange="render()"></select>
    <label>Moneda</label>
    <button class="btn active" id="btn-ars" onclick="setMoneda('ars')">ARS</button>
    <button class="btn" id="btn-usd" onclick="setMoneda('usd')">USD (MEP)</button>
    <span id="freqCtrl" class="hidden"><label>Frecuencia</label>
      <button class="btn active" id="btn-M" onclick="setFreq('M')">Mensual</button>
      <button class="btn" id="btn-W" onclick="setFreq('W')">Semanal</button>
    </span>
    <span class="spacer" style="flex:1"></span>
    <button class="btn no-print" id="btnImprimir" onclick="window.print()">🖨 Imprimir</button>
  </div>

  <div id="vista"></div>
</main>
</div>

<script src="../shared/sibra-auth.js"></script>
<script src="../shared/sibra-cache.js"></script>
<script>
// Hoja SIBRA_BROKERS_OPERACIONES (backend: historicos/fifo/performance rebuild).
const OPERACIONES_SHEET_ID = '1hjo-ESxQA4yX-MHE7NQ3ipLpvhrGIVXC_fN3TotNmIw';

let token=null, posiciones=[], realizado=[], curva=[], moneda='ars', vista='informe', freq='M', modoEvol='valor';
const $=id=>document.getElementById(id);
const fmt=n=>isFinite(n)?'$'+Math.round(n).toLocaleString('es-AR'):'—';
const fmtU=n=>isFinite(n)?'U$D '+n.toLocaleString('es-AR',{maximumFractionDigits:0}):'—';
const fmtQ=n=>isFinite(n)?n.toLocaleString('es-AR',{maximumFractionDigits:2}):'—';
const fmtP=(n,d=4)=>isFinite(n)?n.toLocaleString('es-AR',{maximumFractionDigits:d}):'—';
const pct=n=>isFinite(n)?n.toFixed(1)+'%':'—';
const cls=n=>!isFinite(n)?'':n>=0?'pos':'neg';
const num=v=>{const f=parseFloat(v);return isFinite(f)?f:NaN;};
const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function driveAuth(){ SibraAuth.connect().then(t=>{token=t;showApp();cargar();}).catch(e=>$('loginErr').textContent='Error: '+e.message); }
function restore(){ const t=SibraAuth.getToken(); if(t){token=t;showApp();cargar();} }
function showApp(){ $('login').classList.add('hidden'); $('app').classList.remove('hidden'); }

async function sheetGet(range,fresh){
  const key=`inf_${OPERACIONES_SHEET_ID}_${range}`;
  if(!fresh){ const c=SibraCache.get(key,120); if(c) return c; }
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${OPERACIONES_SHEET_ID}/values/${encodeURIComponent(range)}`;
  const r=await fetch(url,{headers:{Authorization:'Bearer '+token}});
  if(!r.ok) throw new Error('Sheets '+r.status+': '+await r.text());
  const d=await r.json(); SibraCache.set(key,d); return d;
}
function rowsFromValues(values){
  if(!values||!values.length) return [];
  const h=values[0];
  return values.slice(1).map(row=>Object.fromEntries(h.map((k,i)=>[k,row[i]??''])));
}

async function cargar(fresh){
  try{
    const [rev,rea,cur]=await Promise.all([
      sheetGet('REVALUACION!A:AZ',fresh),
      sheetGet('REALIZADO!A:AE',fresh),
      sheetGet('CURVA!A:L',fresh).catch(()=>({values:[]})),
    ]);
    posiciones=rowsFromValues(rev.values);
    realizado=rowsFromValues(rea.values);
    curva=rowsFromValues(cur.values);
    $('setupWarn').classList.add('hidden');
    const upd=posiciones[0]&&posiciones[0].updated_at;
    $('updatedAt').textContent=upd?('FIFO al '+upd.replace('T',' ').slice(0,16)):'';
    poblarFiltros();
    render();
  }catch(e){
    $('setupWarn').classList.remove('hidden');
    $('setupWarn').textContent='No pude leer la hoja de operaciones: '+e.message;
  }
}

function poblarFiltros(){
  const alycs=[...new Set(posiciones.map(p=>p.broker_code).filter(Boolean))].sort();
  $('alycSel').innerHTML='<option value="">Todas</option>'+alycs.map(a=>`<option>${a}</option>`).join('');
  const clientes=[...new Set(posiciones.map(p=>p.client_name).filter(Boolean))].sort();
  $('clienteSel').innerHTML='<option value="">Todos</option>'+clientes.map(c=>`<option>${c}</option>`).join('');
}

function setMoneda(m){ moneda=m; $('btn-ars').classList.toggle('active',m==='ars'); $('btn-usd').classList.toggle('active',m==='usd'); render(); }
function setFreq(f){ freq=f; $('btn-M').classList.toggle('active',f==='M'); $('btn-W').classList.toggle('active',f==='W'); render(); }
function setModoEvol(m){ modoEvol=m; render(); }
function setVista(v){
  vista=v;
  ['informe','abiertas','cerradas','evolucion','heatmap'].forEach(x=>$('v-'+x).classList.toggle('active',x===v));
  $('btnImprimir').style.display=v==='informe'?'':'none';
  $('freqCtrl').classList.toggle('hidden',!(v==='evolucion'||v==='heatmap'));
  render();
}

function filtrar(arr){
  const alyc=$('alycSel').value, cli=$('clienteSel').value;
  return arr.filter(r=>(!alyc||r.broker_code===alyc)&&(!cli||r.client_name===cli));
}

function render(){
  if(vista==='informe') return renderInforme();
  if(vista==='abiertas') return renderAbiertas();
  if(vista==='cerradas') return renderCerradas();
  if(vista==='evolucion') return renderEvolucion();
  if(vista==='heatmap') return renderHeatmap();
}

// ── ABIERTAS (= tenencia) ────────────────────────────────────────────────
function renderAbiertas(){
  const usd=moneda==='usd', F=usd?fmtU:fmt;
  const pos=filtrar(posiciones);
  let valor=0,resNR=0,rentas=0,resTot=0;
  const filas=pos.map(p=>{
    const v=num(usd?p.valor_mercado_usd:p.valor_mercado);
    const c=num(usd?p.costo_total_usd:p.costo_total);
    const rc=num(usd?p.rentas_cobradas_usd:p.rentas_cobradas);
    const rp=usd?(v-c):num(p.resultado_no_realizado);
    const rt=usd?(v-c+(isFinite(rc)?rc:0)):num(p.resultado_total_no_realizado);
    if(isFinite(v))valor+=v; if(isFinite(rp))resNR+=rp; if(isFinite(rc))rentas+=rc; if(isFinite(rt))resTot+=rt;
    return {p,v:isFinite(v)?v:-Infinity,rp,rt,rc};
  }).sort((a,b)=>b.v-a.v);
  const F2=usd?fmtU:fmt;
  $('vista').innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="lbl">Valor de mercado</div><div class="val">${F(valor)}</div></div>
      <div class="kpi"><div class="lbl">Res. no realizado (precio)</div><div class="val ${cls(resNR)}">${F(resNR)}</div></div>
      <div class="kpi"><div class="lbl">Rentas cobradas</div><div class="val">${F(rentas)}</div></div>
      <div class="kpi"><div class="lbl">Resultado TOTAL</div><div class="val ${cls(resTot)}">${F(resTot)}</div></div>
    </div>
    <div class="card"><div class="card-title">Posiciones abiertas <span class="muted">· coincide con la tenencia, revaluada a mercado</span></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Cliente</th><th>ALyC·Cuenta</th><th>Ticker</th><th>Cant.</th><th>PPC</th><th>Spot</th><th>Val. mercado</th><th>DPT</th><th>Res. precio</th><th>Rentas</th><th>Res. TOTAL</th><th>TIR plazo</th><th>TIR anual</th></tr></thead>
      <tbody>${filas.length?filas.map(({p,v,rp,rt,rc})=>`<tr>
        <td>${p.client_name||'—'}</td><td>${p.broker_code}·${p.account}</td><td><b>${p.ticker}</b></td>
        <td>${fmtQ(num(p.quantity))}</td><td>${fmtP(num(usd?p.ppc_usd:p.ppc),6)}</td><td>${fmtP(num(usd?p.precio_spot_usd:p.precio_spot),6)}</td>
        <td>${F2(v)}</td><td>${fmtQ(num(p.dias_tenencia))}</td>
        <td class="${cls(rp)}">${F2(rp)}</td><td>${F2(rc)}</td><td class="${cls(rt)}">${F2(rt)}</td>
        <td>${pct(num(p.tir_plazo_pct))}</td><td>${pct(num(p.tir_anual_pct))}</td></tr>`).join(''):`<tr><td colspan="13" style="text-align:center;color:var(--text3);padding:24px">Sin posiciones</td></tr>`}</tbody>
    </table></div></div>`;
}

// ── CERRADAS (realizado, cada venta casada FIFO) ─────────────────────────
function renderCerradas(){
  const usd=moneda==='usd', F=usd?fmtU:fmt;
  const rows=filtrar(realizado).slice().sort((a,b)=>(b.fecha_venta||'').localeCompare(a.fecha_venta||''));
  let res=0,rentas=0,tot=0;
  rows.forEach(r=>{ res+=num(usd?r.resultado_usd:r.resultado)||0; rentas+=num(usd?r.rentas_cobradas_usd:r.rentas_cobradas)||0; tot+=num(usd?r.resultado_total_usd:r.resultado_total)||0; });
  $('vista').innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="lbl">Ventas casadas</div><div class="val">${rows.length}</div></div>
      <div class="kpi"><div class="lbl">Resultado precio</div><div class="val ${cls(res)}">${F(res)}</div></div>
      <div class="kpi"><div class="lbl">Rentas de lo vendido</div><div class="val">${F(rentas)}</div></div>
      <div class="kpi"><div class="lbl">Resultado TOTAL</div><div class="val ${cls(tot)}">${F(tot)}</div></div>
    </div>
    <div class="card"><div class="card-title">Operaciones cerradas <span class="muted">· cada venta contra su compra (FIFO)</span></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Venta</th><th>Cliente</th><th>ALyC·Cta</th><th>Ticker</th><th>Cant.</th><th>Compra</th><th>Días</th><th>P.compra</th><th>P.venta</th><th>Resultado</th><th>%</th><th>Res.TOTAL</th><th>TIR plazo</th><th>TIR anual</th></tr></thead>
      <tbody>${rows.length?rows.map(r=>{
        const resu=num(usd?r.resultado_usd:r.resultado), rtot=num(usd?r.resultado_total_usd:r.resultado_total);
        const rpct=num(usd?r.resultado_total_pct_usd:r.resultado_total_pct);
        return `<tr><td>${r.fecha_venta||''}</td><td>${r.client_name||'—'}</td><td>${r.broker_code}·${r.account}</td><td><b>${r.ticker}</b></td>
        <td>${fmtQ(num(r.quantity))}</td><td>${r.fecha_compra||''}</td><td>${fmtQ(num(r.dias_tenencia))}</td>
        <td>${fmtP(num(usd?r.precio_compra_usd:r.precio_compra),6)}</td><td>${fmtP(num(usd?r.precio_venta_usd:r.precio_venta),6)}</td>
        <td class="${cls(resu)}">${F(resu)}</td><td class="${cls(rpct)}">${pct(rpct)}</td><td class="${cls(rtot)}">${F(rtot)}</td>
        <td>${pct(num(usd?r.tir_plazo_pct_usd:r.tir_plazo_pct))}</td><td>${pct(num(usd?r.tir_anual_pct_usd:r.tir_anual_pct))}</td></tr>`;
      }).join(''):`<tr><td colspan="14" style="text-align:center;color:var(--text3);padding:24px">Sin operaciones cerradas</td></tr>`}</tbody>
    </table></div></div>`;
}

// ── Serie de CURVA para el filtro actual (consolidado por defecto) ───────
// Devuelve por fecha: valor, flujo del período y RENDIMIENTO del período.
// El rendimiento NO se puede sumar entre cuentas: cuando el filtro agrupa
// varias, se recalcula desde los valores y flujos sumados (Dietz simple, el
// flujo pesa medio período); con una sola fila se usa el Modified Dietz que
// ya calculó el backend con las fechas reales de cada flujo.
function serieCurva(){
  const alyc=$('alycSel').value, cli=$('clienteSel').value;
  let rows=curva.filter(r=>r.freq===freq);
  if(!alyc && !cli){
    rows=rows.filter(r=>r.broker_code==='__ALL__');
  }else{
    rows=rows.filter(r=>r.broker_code!=='__ALL__' && (!alyc||r.broker_code===alyc) && (!cli||r.client_name===cli));
  }
  const g={};
  rows.forEach(r=>{
    const f=r.fecha; if(!f) return;
    if(!g[f]) g[f]={fecha:f,ars:0,usd:0,flujoArs:0,flujoUsd:0,n:0,retArs:NaN,retUsd:NaN,sinPrecio:false};
    const x=g[f];
    x.ars+=num(r.valor_ars)||0; x.usd+=num(r.valor_usd)||0;
    x.flujoArs+=num(r.flujo_ars)||0; x.flujoUsd+=num(r.flujo_usd)||0;
    x.retArs=num(r.retorno_pct); x.retUsd=num(r.retorno_usd_pct);
    x.n++;
    if(String(r.sin_precio||'').trim()) x.sinPrecio=true;
  });
  const serie=Object.values(g).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  // Si hay más de una cuenta por fecha, el retorno del backend no sirve: recalcular.
  for(let i=0;i<serie.length;i++){
    const p=serie[i], prev=serie[i-1];
    if(p.n>1){
      ['ars','usd'].forEach(m=>{
        const key=m==='ars'?'retArs':'retUsd', fl=m==='ars'?'flujoArs':'flujoUsd';
        if(!prev){ p[key]=NaN; return; }
        const base=prev[m]+p[fl]/2;
        p[key]=base>0?((p[m]-prev[m]-p[fl])/base)*100:NaN;
      });
    }
    if(i===0){ p.retArs=NaN; p.retUsd=NaN; }
  }
  // TWR acumulado encadenado sobre los retornos ya resueltos
  let accA=1, accU=1;
  serie.forEach(p=>{
    if(isFinite(p.retArs)) accA*=(1+p.retArs/100);
    if(isFinite(p.retUsd)) accU*=(1+p.retUsd/100);
    p.twrArs=(accA-1)*100; p.twrUsd=(accU-1)*100;
  });
  return serie;
}

// ── EVOLUCIÓN (línea del valor de cartera) ───────────────────────────────
function renderEvolucion(){
  const usd=moneda==='usd';
  const full=serieCurva();
  // modo 'valor' = pesos/dólares de cartera; 'twr' = rendimiento base 100
  const serie=full.map(d=>({fecha:d.fecha,
    valor: modoEvol==='twr' ? 100*(1+(usd?d.twrUsd:d.twrArs)/100) : (usd?d.usd:d.ars)}));
  if(serie.length<2){ $('vista').innerHTML=`<div class="card"><div class="status" style="padding:24px;text-align:center">Sin serie de evolución todavía (la curva CURVA se genera en el ciclo del backend). ${curva.length?'':'La tab CURVA está vacía.'}</div></div>`; return; }
  const W=1000,H=340,pl=70,pr=16,pt=16,pb=34;
  const ys=serie.map(d=>d.valor);
  // Valor: base cero (es una magnitud). Rendimiento: índice base 100, no se
  // fuerza el cero — la referencia es la línea de 100.
  let ymin,ymax;
  if(modoEvol==='twr'){
    const lo=Math.min(100,...ys), hi=Math.max(100,...ys), pad=Math.max(1,(hi-lo)*0.12);
    ymin=lo-pad; ymax=hi+pad;
  }else{ ymin=Math.min(0,...ys); ymax=Math.max(...ys); }
  const X=i=>pl+(W-pl-pr)*(i/(serie.length-1));
  const Y=v=>H-pb-(H-pt-pb)*((v-ymin)/((ymax-ymin)||1));
  const linePath=serie.map((d,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(d.valor).toFixed(1)}`).join(' ');
  const areaPath=`${linePath} L${X(serie.length-1).toFixed(1)},${Y(ymin).toFixed(1)} L${X(0).toFixed(1)},${Y(ymin).toFixed(1)} Z`;
  // en modo rendimiento el eje es base 100, no plata
  const F=modoEvol==='twr' ? (v=>isFinite(v)?v.toFixed(0):'—') : (usd?fmtU:fmt);
  // ticks Y (4)
  let yticks='';
  for(let k=0;k<=4;k++){ const v=ymin+(ymax-ymin)*k/4; const y=Y(v); yticks+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="var(--border)" stroke-width="1"/><text x="${pl-6}" y="${y+3}" text-anchor="end" fill="var(--text3)" font-size="10">${F(v)}</text>`; }
  // ticks X (hasta 8 fechas)
  const step=Math.max(1,Math.ceil(serie.length/8));
  let xticks='';
  for(let i=0;i<serie.length;i+=step){ const x=X(i); xticks+=`<text x="${x}" y="${H-pb+16}" text-anchor="middle" fill="var(--text3)" font-size="10">${serie[i].fecha.slice(0,7)}</text>`; }
  const twrFin=usd?full[full.length-1].twrUsd:full[full.length-1].twrArs;
  const dias=(new Date(full[full.length-1].fecha)-new Date(full[0].fecha))/86400000;
  const twrAnual=(dias>30&&isFinite(twrFin))?((Math.pow(1+twrFin/100,365/dias)-1)*100):NaN;
  const flujoTot=full.reduce((s,p)=>s+(usd?p.flujoUsd:p.flujoArs),0);
  $('vista').innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="lbl">Valor actual</div><div class="val">${(usd?fmtU:fmt)(usd?full[full.length-1].usd:full[full.length-1].ars)}</div></div>
      <div class="kpi"><div class="lbl">Rendimiento acumulado (TWR)</div><div class="val ${cls(twrFin)}">${pct(twrFin)}</div></div>
      <div class="kpi"><div class="lbl">Anualizado</div><div class="val ${cls(twrAnual)}">${pct(twrAnual)}</div></div>
      <div class="kpi"><div class="lbl">Flujo neto del período</div><div class="val">${(usd?fmtU:fmt)(flujoTot)}</div></div>
      <div class="kpi"><div class="lbl">Puntos (${freq==='M'?'meses':'semanas'})</div><div class="val">${serie.length}</div></div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">
        <div class="card-title" style="margin:0">${modoEvol==='twr'?'Rendimiento acumulado (base 100)':'Valor de cartera'} <span class="muted">· ${usd?'USD (MEP)':'ARS'} · ${freq==='M'?'mensual':'semanal'}</span></div>
        <span class="spacer" style="flex:1"></span>
        <button class="btn ${modoEvol==='valor'?'active':''}" onclick="setModoEvol('valor')">Valor</button>
        <button class="btn ${modoEvol==='twr'?'active':''}" onclick="setModoEvol('twr')">Rendimiento</button>
      </div>
      <svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">
        ${yticks}
        ${modoEvol==='twr'?`<line x1="${pl}" y1="${Y(100)}" x2="${W-pr}" y2="${Y(100)}" stroke="var(--text3)" stroke-width="1" stroke-dasharray="4 3"/><text x="${W-pr-2}" y="${Y(100)-5}" text-anchor="end" fill="var(--text3)" font-size="9">base 100</text>`:''}
        <path d="${areaPath}" fill="var(--red)" opacity="0.08"/>
        <path d="${linePath}" fill="none" stroke="var(--red-light)" stroke-width="2" stroke-linejoin="round"/>
        ${xticks}
      </svg>
      <div class="status" style="margin-top:6px">
        <b>Valor</b>: tenencia de títulos revaluada al cierre de data912 de cada corte — sube y baja también por compras/ventas.
        <b>Rendimiento</b>: TWR encadenado (Modified Dietz), que descuenta esos flujos y mide solo la gestión. El anualizado compone el acumulado a 365 días.
      </div>
    </div>`;
}

// ── HEATMAP (variación del valor por período) ────────────────────────────
function renderHeatmap(){
  const usd=moneda==='usd';
  const serie=serieCurva();
  if(serie.length<2){ $('vista').innerHTML=`<div class="card"><div class="status" style="padding:24px;text-align:center">Sin serie para el heatmap todavía (la curva CURVA se genera en el ciclo del backend).</div></div>`; return; }
  // Rendimiento REAL del período (Modified Dietz: ya descuenta compras/ventas)
  const rets=serie.slice(1).map(p=>({fecha:p.fecha, r:(usd?p.retUsd:p.retArs)/100}));
  const maxAbs=Math.max(0.01,...rets.map(x=>Math.abs(x.r)).filter(isFinite));
  const color=r=>{ if(!isFinite(r)) return 'var(--bg3)'; const t=Math.min(1,Math.abs(r)/maxAbs); const a=(0.15+0.85*t).toFixed(2);
    return r>=0?`rgba(34,197,94,${a})`:`rgba(225,6,0,${a})`; };
  let html;
  if(freq==='M'){
    const years=[...new Set(rets.map(x=>x.fecha.slice(0,4)))].sort();
    const byYM={}; rets.forEach(x=>{ byYM[x.fecha.slice(0,7)]=x.r; });
    html=`<table class="hm-tabla"><thead><tr><th></th>${MESES.map(m=>`<th>${m}</th>`).join('')}<th>Año</th></tr></thead><tbody>`;
    years.forEach(y=>{
      let acc=1, any=false;
      html+=`<tr><th>${y}</th>`;
      for(let m=1;m<=12;m++){ const key=`${y}-${String(m).padStart(2,'0')}`; const r=byYM[key];
        if(isFinite(r)){ any=true; acc*=(1+r); html+=`<td><div class="hm-cell" style="background:${color(r)}">${(r*100).toFixed(1)}%</div></td>`; }
        else html+=`<td><div class="hm-cell hm-empty">·</div></td>`; }
      // El acumulado anual NO se pinta con la escala mensual (satura siempre y
      // daria a entender que es comparable con una celda de mes): solo texto.
      const ry=any?(acc-1):NaN;
      html+=`<td><div class="hm-cell" style="background:var(--bg3);border:1px solid var(--border)"><span class="${cls(ry)}">${isFinite(ry)?(ry*100).toFixed(1)+'%':'·'}</span></div></td></tr>`;
    });
    html+='</tbody></table>';
  }else{
    // semanal: filas = año, columnas = semana ISO (compacto, scrollable)
    const rowsByYear={}; rets.forEach(x=>{ const y=x.fecha.slice(0,4); (rowsByYear[y] ||= []).push(x); });
    html='<div style="overflow-x:auto">';
    Object.keys(rowsByYear).sort().forEach(y=>{
      html+=`<div style="margin-bottom:6px"><div class="status" style="margin-bottom:3px">${y}</div><div style="display:flex;gap:3px;flex-wrap:wrap">`;
      rowsByYear[y].forEach(x=>{ html+=`<div class="hm-cell" title="${x.fecha}" style="background:${color(x.r)};min-width:40px">${isFinite(x.r)?(x.r*100).toFixed(1):''}<small>${x.fecha.slice(5)}</small></div>`; });
      html+='</div></div>';
    });
    html+='</div>';
  }
  $('vista').innerHTML=`<div class="card">
    <div class="card-title">Rendimiento por período <span class="muted">· ${usd?'USD (MEP)':'ARS'} · ${freq==='M'?'mensual (con acumulado anual)':'semanal'} · time-weighted</span></div>
    ${html}
    <div class="status" style="margin-top:10px">Verde = ganó, rojo = perdió; intensidad por magnitud. Rendimiento <b>time-weighted (Modified Dietz)</b>: descuenta las compras y ventas del período ponderadas por los días que estuvieron invertidas, así el número mide la gestión y no el capital que entró o salió. El acumulado anual encadena los meses. Valúa solo títulos (no el efectivo ocioso).</div>
  </div>`;
}

// ── INFORME imprimible (agrupado ALyC → cuenta) ──────────────────────────
function renderInforme(){
  const usd=moneda==='usd', F2=usd?fmtU:fmt;
  const pos=filtrar(posiciones);
  const realPorCuenta={};
  filtrar(realizado).forEach(r=>{
    const k=r.broker_code+'|'+r.account;
    if(!realPorCuenta[k]) realPorCuenta[k]={tot:0,n:0};
    realPorCuenta[k].tot+=num(r.resultado_total)||0; realPorCuenta[k].n++;
  });
  const porAlyc={};
  pos.forEach(p=>{ const alyc=p.broker_code||'(sin ALyC)', cta=p.account||'(sin cuenta)';
    (porAlyc[alyc] ||= {}); (porAlyc[alyc][cta] ||= {filas:[]}); porAlyc[alyc][cta].filas.push(p); });
  Object.keys(realPorCuenta).forEach(k=>{ const [alyc,cta]=k.split('|');
    if($('alycSel').value && $('alycSel').value!==alyc) return;
    (porAlyc[alyc] ||= {}); if(!porAlyc[alyc][cta]) porAlyc[alyc][cta]={filas:[]}; });
  const alycsOrd=Object.keys(porAlyc).sort();
  $('vista').innerHTML=alycsOrd.length?alycsOrd.map(alyc=>{
    const cuentas=porAlyc[alyc], cuentasOrd=Object.keys(cuentas).sort();
    const bloques=cuentasOrd.map(cta=>{
      const filas=cuentas[cta].filas;
      const nombre=filas[0]?.client_name || '—';
      const real=realPorCuenta[alyc+'|'+cta] || {tot:0,n:0};
      let valorTot=0,resTot=0;
      const filasHtml=filas.map(p=>{
        const v=num(usd?p.valor_mercado_usd:p.valor_mercado), c=num(usd?p.costo_total_usd:p.costo_total), rc=num(usd?p.rentas_cobradas_usd:p.rentas_cobradas);
        const rt=usd?(isFinite(v)&&isFinite(c)?v-c+(isFinite(rc)?rc:0):NaN):num(p.resultado_total_no_realizado);
        if(isFinite(v))valorTot+=v; if(isFinite(rt))resTot+=rt;
        return `<tr><td><b>${p.ticker}</b></td><td>${fmtQ(num(p.quantity))}</td><td>${fmtP(num(usd?p.ppc_usd:p.ppc),6)}</td><td>${fmtP(num(usd?p.precio_spot_usd:p.precio_spot),6)}</td><td>${F2(v)}</td><td class="${cls(rt)}">${F2(rt)}</td><td>${pct(num(p.tir_plazo_pct))}</td><td>${pct(num(p.tir_anual_pct))}</td></tr>`;
      }).join('');
      return `<div class="informe-cuenta"><div class="informe-cuenta-h"><span class="nombre">${nombre}</span><span class="cta">Cuenta ${cta}</span></div>
        ${filas.length?`<div class="tbl-wrap"><table><thead><tr><th>Ticker</th><th>Cant.</th><th>PPC</th><th>Spot</th><th>Val. mercado</th><th>Res. TOTAL</th><th>TIR plazo</th><th>TIR anual</th></tr></thead><tbody>${filasHtml}</tbody></table></div>`:`<div class="status">Sin posiciones abiertas</div>`}
        <div class="informe-subtot" style="margin-top:8px"><span>Valor mercado: <b>${F2(valorTot)}</b></span><span>Res. no realizado TOTAL: <b class="${cls(resTot)}">${F2(resTot)}</b></span><span>Realizado: <b class="${cls(real.tot)}">${fmt(real.tot)}</b> (${real.n})</span></div></div>`;
    }).join('');
    return `<div class="informe-grupo"><div class="informe-grupo-h">${alyc}</div>${bloques}</div>`;
  }).join(''):`<div class="status" style="padding:24px;text-align:center">Sin datos para el filtro elegido</div>`;
}

restore();
</script>
